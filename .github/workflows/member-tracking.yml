# Samples corp member locations every ~10 minutes (GitHub cron has jitter,
# which is fine for movement logging). The endpoint diffs locations against
# the previous snapshot and appends transitions to a 7-day KV log shown on
# the galaxy map. Requires the CRON_SECRET repo secret (same value as the
# Vercel env var of the same name).
name: member-tracking

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  sample:
    runs-on: ubuntu-latest
    steps:
      - name: Sample member locations
        # The secret goes through an env var, NOT inline ${{ }} substitution:
        # inline substitution pastes the raw value into the bash script, where
        # characters like $ would be re-expanded by the shell and corrupt it.
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS -X POST \
            --retry 3 --retry-delay 5 --retry-all-errors --max-time 30 \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -f "https://www.the-keymaker.net/api/map?action=sample"
