*{margin:0;padding:0;box-sizing:border-box}

body{background:var(--bg);color:var(--w);font-family:'Inter',sans-serif;height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:1.25rem;padding:2rem}

.btn{font-family:'Syne',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.55rem 1.2rem;background:transparent;border:1px solid var(--b);color:var(--m);text-decoration:none;transition:all .18s;margin-top:0.5rem;display:inline-block}
.btn:hover{border-color:var(--m);color:var(--w)}
</style>
