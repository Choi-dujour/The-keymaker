<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060e;--s:#0c0c1a;--s2:#101020;--b:#16162a;--b2:#1e1e36;
  --g:#39FF14;--w:#ECEDF5;--m:#5a5a7a;--m2:#8080a0;
  --red:#ff4455;--yellow:#ffcc33;--orange:#ff8833;--blue:#4488ff;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--w);font-family:'Inter',sans-serif;font-size:14px}
#gl{position:fixed;inset:0;display:block;touch-action:none}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(1.25rem,4vw,3rem);height:52px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);background:rgba(6,6,14,0.75);
}
.n-left{display:flex;align-items:center;gap:0.6rem}
.n-logo{width:24px;height:24px;border-radius:3px;object-fit:cover;opacity:0.9}
.n-name{font-family:'Syne',sans-serif;font-size:0.8rem;font-weight:700;letter-spacing:0.04em}
.n-name em{color:var(--g);font-style:normal}
.n-right{display:flex;gap:0.5rem;overflow-x:auto}
.btn{font-family:'Syne',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:0.4rem 0.85rem;cursor:pointer;transition:all .18s;text-decoration:none;display:inline-flex;align-items:center;gap:0.3rem;border:none;white-space:nowrap}
.btn-o{background:transparent;border:1px solid var(--b);color:var(--m)}
.btn-o:hover{border-color:var(--m);color:var(--w)}

/* PANELS */
.panel{
  position:fixed;z-index:50;background:rgba(12,12,26,0.88);border:1px solid var(--b);
  backdrop-filter:blur(14px);display:flex;flex-direction:column;
}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:0.6rem;padding:0.7rem 0.9rem;border-bottom:1px solid var(--b)}
.panel-title{font-family:'Syne',sans-serif;font-size:0.62rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--m2)}
.panel-body{overflow-y:auto;flex:1}

/* MODE SWITCH (top center) */
#mode-switch{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:55;display:flex;background:rgba(12,12,26,0.88);border:1px solid var(--b);backdrop-filter:blur(14px)}
#mode-switch button{background:transparent;border:none;border-right:1px solid var(--b);color:var(--m);font-family:'Syne',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.5rem 1rem;cursor:pointer;transition:all .15s}
#mode-switch button:last-child{border-right:none}
#mode-switch button:hover{color:var(--w)}
#mode-switch button.on{color:var(--g);background:rgba(57,255,20,0.07)}
#sov-legend{position:fixed;top:104px;left:50%;transform:translateX(-50%);z-index:54;background:rgba(12,12,26,0.88);border:1px solid var(--b);backdrop-filter:blur(14px);padding:0.5rem 0.8rem;display:none;max-width:min(560px,92vw)}
#sov-legend.show{display:flex;flex-wrap:wrap;gap:0.35rem 0.9rem}
.lg-item{display:flex;align-items:center;gap:0.35rem;font-size:0.62rem;color:var(--m2);white-space:nowrap}
.lg-dot{width:8px;height:8px;border-radius:50%}

/* ROUTE PANEL */
#route-panel{top:68px;left:16px;width:250px;max-height:calc(100vh - 160px)}
.rp-body{padding:0.75rem 0.9rem;display:flex;flex-direction:column;gap:0.6rem}
.rp-field{position:relative}
.rp-field label{display:block;font-size:0.56rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--m);margin-bottom:0.3rem}
.rp-field input{width:100%;background:var(--s2);border:1px solid var(--b);color:var(--w);padding:0.5rem 0.7rem;font-size:0.78rem;outline:none;font-family:'Inter',sans-serif}
.rp-field input:focus{border-color:var(--g)}
.ac{position:absolute;top:100%;left:0;right:0;z-index:60;background:var(--s2);border:1px solid var(--b2);border-top:none;max-height:180px;overflow-y:auto;display:none}
.ac.open{display:block}
.ac-item{padding:0.45rem 0.7rem;font-size:0.72rem;cursor:pointer;display:flex;justify-content:space-between;gap:0.5rem}
.ac-item:hover{background:rgba(57,255,20,0.08)}
.ac-sec{font-family:var(--mono);font-size:0.62rem}
.flag-group{display:flex;gap:0.3rem}
.flag-btn{flex:1;font-family:'Syne',sans-serif;font-size:0.54rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;background:transparent;border:1px solid var(--b);color:var(--m);padding:0.38rem 0.2rem;cursor:pointer;transition:all .15s}
.flag-btn.active{border-color:var(--g);color:var(--g);background:rgba(57,255,20,0.06)}
.rp-actions{display:flex;gap:0.4rem}
.rp-actions button{flex:1;font-family:'Syne',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:0.5rem;cursor:pointer;border:1px solid var(--b);background:transparent;color:var(--m);transition:all .15s}
.rp-actions .go{background:var(--g);border-color:var(--g);color:#000}
.rp-actions .go:hover{background:#50ff30}
.rp-actions button:not(.go):hover{border-color:var(--m);color:var(--w)}
.rp-summary{font-size:0.66rem;color:var(--m);line-height:1.8;border-top:1px solid var(--b);padding-top:0.55rem;display:none}
.rp-summary.show{display:block}
.rp-summary b{color:var(--w);font-weight:500}
.rp-hq{font-size:0.62rem;color:var(--m);border-top:1px solid var(--b);padding-top:0.55rem;display:flex;align-items:center;gap:0.4rem}
.rp-hq a{color:var(--g);text-decoration:none;cursor:pointer}

/* FEED */
#feed-panel{top:68px;right:16px;width:290px;max-height:calc(100vh - 160px)}
.badge{font-family:var(--mono);font-size:0.58rem;padding:0.15rem 0.5rem;border-radius:2px;letter-spacing:0.1em}
.badge.live{color:var(--g);background:rgba(57,255,20,0.1)}
.badge.live::before{content:'●';margin-right:0.3rem;animation:blink 1.6s infinite}
.badge.delayed{color:var(--yellow);background:rgba(255,204,51,0.1)}
.badge.off{color:var(--m);background:rgba(90,90,122,0.15)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.kill-row{display:block;padding:0.5rem 0.9rem;border-bottom:1px solid rgba(22,22,42,0.7);text-decoration:none;color:var(--w);transition:background .12s}
.kill-row:hover{background:rgba(255,68,85,0.06)}
.kill-top{display:flex;justify-content:space-between;gap:0.5rem;font-size:0.72rem}
.kill-ship{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kill-isk{font-family:var(--mono);font-size:0.66rem;color:var(--red);white-space:nowrap}
.kill-sub{display:flex;justify-content:space-between;font-size:0.6rem;color:var(--m);margin-top:0.12rem}
.feed-empty{padding:1.2rem 0.9rem;font-size:0.7rem;color:var(--m);text-align:center;line-height:1.7}

/* INFO CARD */
#info-card{bottom:16px;left:16px;width:250px;padding:0.9rem 1rem;display:none}
#info-card.show{display:block}
#info-card h3{font-family:'Syne',sans-serif;font-size:1rem;margin-bottom:0.2rem}
#info-card .ic-region{font-size:0.65rem;color:var(--m);margin-bottom:0.5rem}
#info-card .ic-sov{font-size:0.66rem;color:var(--m2);margin:0.4rem 0 0}
.sec-badge{font-family:var(--mono);font-size:0.68rem;padding:0.12rem 0.45rem;border-radius:2px;background:rgba(255,255,255,0.06)}
#info-card .ic-links{display:flex;gap:0.5rem;margin-top:0.6rem}
#info-card .ic-links a{font-size:0.62rem;color:var(--m2);text-decoration:none}
#info-card .ic-links a:hover{color:var(--g)}
#info-card .ic-x{position:absolute;top:0.4rem;right:0.6rem;background:none;border:none;color:var(--m);cursor:pointer;font-size:0.9rem}

/* OVERLAY LABELS */
#hover-label{position:fixed;z-index:60;pointer-events:none;display:none;background:rgba(12,12,26,0.92);border:1px solid var(--b2);padding:0.25rem 0.55rem;font-size:0.68rem;font-family:var(--mono);white-space:nowrap;line-height:1.5}
.region-label{position:fixed;z-index:40;pointer-events:none;font-family:var(--mono);font-size:0.62rem;letter-spacing:0.28em;text-transform:uppercase;color:rgba(170,175,200,0.55);white-space:nowrap;transform:translate(-50%,-50%);text-shadow:0 0 6px #000}
.route-label{position:fixed;z-index:45;pointer-events:none;font-family:var(--mono);font-size:0.66rem;white-space:nowrap;transform:translate(8px,-50%);text-shadow:0 1px 4px #000,0 0 8px #000}
.route-label b{font-weight:500}

/* CEO panel is injected by JS */
#ceo-panel{bottom:16px;right:16px;width:330px;max-height:44vh}
.mv-row{display:flex;align-items:baseline;gap:0.5rem;padding:0.38rem 0.9rem;font-size:0.7rem;border-bottom:1px solid rgba(22,22,42,0.7)}
.mv-time{font-family:var(--mono);font-size:0.6rem;color:var(--m);white-space:nowrap}
.mv-who{color:var(--g);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.mv-route{flex:1;color:var(--m2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mv-route b{color:var(--w);font-weight:500}
.ceo-controls{display:flex;gap:0.4rem;padding:0.55rem 0.9rem;border-bottom:1px solid var(--b);flex-wrap:wrap;align-items:center}
.ceo-controls select{background:var(--s2);border:1px solid var(--b);color:var(--w);font-size:0.65rem;padding:0.3rem 0.4rem;outline:none}
.ceo-controls button{background:transparent;border:1px solid var(--b);color:var(--m);font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;font-family:'Syne',sans-serif;font-weight:700;padding:0.32rem 0.6rem;cursor:pointer}
.ceo-controls button:hover,.ceo-controls button.on{border-color:var(--g);color:var(--g)}
.ceo-stalled{padding:0.45rem 0.9rem;font-size:0.62rem;color:var(--yellow);border-bottom:1px solid var(--b)}
#replay-name{position:fixed;z-index:60;pointer-events:none;display:none;color:var(--g);font-size:0.62rem;font-family:var(--mono);text-shadow:0 0 6px #000}
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(150%);z-index:300;background:var(--s2);border:1px solid rgba(57,255,20,0.4);color:var(--w);padding:0.7rem 1.4rem;font-size:0.78rem;transition:transform .25s;max-width:90vw}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.err{border-color:var(--red)}

/* Mobile: panels become toggleable sheets */
.sheet-toggles{display:none;position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:70;gap:0.5rem}
.sheet-toggles button{background:rgba(12,12,26,0.9);border:1px solid var(--b);color:var(--m2);font-family:'Syne',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:0.5rem 0.9rem;cursor:pointer}
.sheet-toggles button.on{border-color:var(--g);color:var(--g)}
@media(max-width:760px){
  .sheet-toggles{display:flex}
  #route-panel,#feed-panel,#ceo-panel{top:auto;left:8px;right:8px;bottom:60px;width:auto;max-height:46vh;display:none}
  #route-panel.open,#feed-panel.open,#ceo-panel.open{display:flex}
  #info-card{bottom:60px}
  .region-label{font-size:0.54rem}
}
</style>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from '/vendor/OrbitControls.min.js';

const TEST_MODE = location.hash.includes('test');
const ESI = 'https://esi.evetech.net/latest';

// ────────────────────────── data ──────────────────────────
const DATA = await fetch('/map-data.json').then(r => r.json());
const REGIONS = DATA.regions.map(([id, name]) => ({ id, name }));
const SYSTEMS = DATA.systems.map(([id, name, sec10, r, x, y, z]) => ({ id, name, sec10, r, x, y, z }));
const SYS_BY_ID = new Map(SYSTEMS.map((s, i) => [s.id, i]));
const ADJ = Array.from({ length: SYSTEMS.length }, () => []);
for (const [a, b] of DATA.jumps) { ADJ[a].push(b); ADJ[b].push(a); }

// ────────────────────────── EVE security palette (in-game colors) ──────────
const SEC_HEX = { 10:'#2E74DF', 9:'#379CF6', 8:'#4ACFF3', 7:'#5CDCA6', 6:'#71E754', 5:'#F5FF83', 4:'#DC6D07', 3:'#CE440F', 2:'#BC1113', 1:'#732020', 0:'#8F2F6B' };
function secHex(sec10){ return SEC_HEX[Math.max(0, Math.min(10, sec10))]; }
const SEC_COLORS = {};
for (const [k, v] of Object.entries(SEC_HEX)) SEC_COLORS[k] = new THREE.Color(v);
function secColor(sec10){ return SEC_COLORS[Math.max(0, Math.min(10, sec10))]; }
function secLabelOf(sec10){ return (sec10 / 10).toFixed(1); }

// ────────────────────────── faction colors (political map) ─────────────────
const FACTIONS = {
  500001: ['Caldari State', '#4E7CBF'],
  500002: ['Minmatar Republic', '#A63A2B'],
  500003: ['Amarr Empire', '#C8A24A'],
  500004: ['Gallente Federation', '#3F9E5F'],
  500005: ['Jove Empire', '#9AA3AD'],
  500006: ['CONCORD Assembly', '#57A6A0'],
  500007: ['Ammatar Mandate', '#93764A'],
  500008: ['Khanid Kingdom', '#8A4E6B'],
  500009: ['The Syndicate', '#8E8E9E'],
  500010: ['Guristas Pirates', '#B4A054'],
  500011: ['Angel Cartel', '#8C7A5C'],
  500012: ['Blood Raider Covenant', '#8F2222'],
  500014: ['ORE', '#C77F2A'],
  500015: ['Thukker Tribe', '#7A5C3C'],
  500016: ['Servant Sisters of EVE', '#B8B8C8'],
  500018: ['Mordu\'s Legion', '#6C8FB8'],
  500019: ["Sansha's Nation", '#9BA24E'],
  500020: ['Serpentis', '#5D8F5D'],
  500026: ['Triglavian Collective', '#B03030'],
};

// ────────────────────────── scene ──────────────────────────
const canvas = document.getElementById('gl');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, innerWidth <= 760 ? 1.5 : 2));
renderer.setClearColor(0x06060e);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, 1, 0.5, 6000);

// positions: (x, z, y) so the galactic disc lies flat under the default camera
const pos = new Float32Array(SYSTEMS.length * 3);
SYSTEMS.forEach((s, i) => { pos[i*3] = s.x; pos[i*3+1] = s.z; pos[i*3+2] = s.y; });
function vecOf(i){ return new THREE.Vector3(pos[i*3], pos[i*3+1], pos[i*3+2]); }

const colorAttr = new THREE.BufferAttribute(new Float32Array(SYSTEMS.length * 3), 3);

function discTexture(){
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(0.35,'rgba(255,255,255,0.8)'); g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}

const pointsGeo = new THREE.BufferGeometry();
pointsGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
pointsGeo.setAttribute('color', colorAttr);
const points = new THREE.Points(pointsGeo, new THREE.PointsMaterial({
  vertexColors: true, size: 2.4, sizeAttenuation: true, map: discTexture(),
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
}));
scene.add(points);

const jumpPos = new Float32Array(DATA.jumps.length * 6);
DATA.jumps.forEach(([a, b], i) => {
  jumpPos[i*6]   = pos[a*3];   jumpPos[i*6+1] = pos[a*3+1]; jumpPos[i*6+2] = pos[a*3+2];
  jumpPos[i*6+3] = pos[b*3];   jumpPos[i*6+4] = pos[b*3+1]; jumpPos[i*6+5] = pos[b*3+2];
});
const jumpsGeo = new THREE.BufferGeometry();
jumpsGeo.setAttribute('position', new THREE.BufferAttribute(jumpPos, 3));
scene.add(new THREE.LineSegments(jumpsGeo, new THREE.LineBasicMaterial({
  color: 0x2a2a4a, transparent: true, opacity: 0.28, depthWrite: false, blending: THREE.AdditiveBlending,
})));

// frame the camera on the k-space bounding sphere
const centroid = new THREE.Vector3();
for (let i = 0; i < SYSTEMS.length; i++) centroid.add(vecOf(i));
centroid.divideScalar(SYSTEMS.length);
let radius = 0;
for (let i = 0; i < SYSTEMS.length; i++) radius = Math.max(radius, centroid.distanceTo(vecOf(i)));
const fitDist = radius / Math.tan((camera.fov / 2) * Math.PI / 180) * 0.62; // slight crop of outliers
camera.position.set(centroid.x, centroid.y + fitDist * 0.75, centroid.z + fitDist * 0.66);

const controls = new OrbitControls(camera, canvas);
controls.target.copy(centroid);

function updateWorldScale(){
  const d = camera.position.distanceTo(controls.target);

  worldScale = Math.min(1, Math.max(0.05, d / 500));
  if (hqSprite) hqSprite.scale.setScalar(Math.min(4.5, Math.max(0.35, d * 0.01)));

function resize(){

// ────────────────────────── color modes + sovereignty ──────────────────────
let colorMode = 'sec';           // 'sec' | 'sov' | 'faction'
let SOV = null;                  // Map system_id -> {a: allianceId|null, f: factionId|null}
let sovNames = {};               // allianceId -> name
let sovLoading = false;
const DIM_OFF_ROUTE = 0.3;
const grayColor = new THREE.Color('#3a3a48');

function allianceColor(id){
  return new THREE.Color().setHSL(((id * 137.508) % 360) / 360, 0.62, 0.55);
}
const allianceColorCache = new Map();
function baseColorOf(i){
  const s = SYSTEMS[i];
  if (colorMode === 'sec' || !SOV) return secColor(s.sec10);
  const sov = SOV.get(s.id);
  if (colorMode === 'sov') {
    if (!sov?.a) return grayColor;
    let c = allianceColorCache.get(sov.a);
    if (!c) { c = allianceColor(sov.a); allianceColorCache.set(sov.a, c); }
    return c;
  }
  // faction mode
  const fid = sov?.f;
  if (!fid) return grayColor;
  const meta = FACTIONS[fid];
  return meta ? new THREE.Color(meta[1]) : allianceColor(fid);
}

function applyColors(){
  const arr = colorAttr.array;
  for (let i = 0; i < SYSTEMS.length; i++) {
    const dim = ROUTE_SET.size ? (ROUTE_SET.has(SYSTEMS[i].id) ? 1 : DIM_OFF_ROUTE) : 1;
    const c = baseColorOf(i);
    arr[i*3] = c.r * dim; arr[i*3+1] = c.g * dim; arr[i*3+2] = c.b * dim;
  }
  colorAttr.needsUpdate = true;
  needsRender = true;
}

async function ensureSov(){
  if (SOV || sovLoading) return !!SOV;
  sovLoading = true;
  try {
    const list = await fetch(`${ESI}/sovereignty/map/?datasource=tranquility`).then(r => { if (!r.ok) throw new Error('ESI ' + r.status); return r.json(); });
    SOV = new Map();
    const allianceCount = new Map();
    for (const e of list) {
      SOV.set(e.system_id, { a: e.alliance_id || null, f: e.faction_id || null });
      if (e.alliance_id) allianceCount.set(e.alliance_id, (allianceCount.get(e.alliance_id) || 0) + 1);
    }
    // resolve names for the biggest alliances (legend + hover)
    const top = [...allianceCount.entries()].sort((a, b) => b[1] - a[1]).slice(0, 30).map(([id]) => id);
    if (top.length) {
      try {
        const r = await fetch(`${ESI}/universe/names/?datasource=tranquility`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(top),
        });
        if (r.ok) for (const it of await r.json()) sovNames[it.id] = it.name;
      } catch {}
    }
    SOV._allianceCount = allianceCount;
    return true;
  } catch (e) {
    toast('Sovereignty data unavailable (' + e.message + ')', true);
    return false;
  } finally {
    sovLoading = false;
  }
}

function sovLabelOf(systemId){
  if (!SOV) return null;
  const sov = SOV.get(systemId);
  if (!sov) return null;
  if (sov.a) return sovNames[sov.a] || 'Alliance #' + sov.a;
  if (sov.f) return FACTIONS[sov.f]?.[0] || 'Faction #' + sov.f;
  return null;
}

function renderLegend(){
  const el = document.getElementById('sov-legend');
  if (colorMode === 'sec' || !SOV) { el.className = ''; el.innerHTML = ''; return; }
  let items = [];
  if (colorMode === 'sov') {
    const top = [...SOV._allianceCount.entries()].sort((a, b) => b[1] - a[1]).slice(0, 10);
    items = top.map(([id, n]) => ({ color: '#' + allianceColor(id).getHexString(), label: (sovNames[id] || '#' + id) + ' (' + n + ')' }));
  } else {
    const count = new Map();
    for (const { f } of SOV.values()) if (f) count.set(f, (count.get(f) || 0) + 1);
    items = [...count.entries()].sort((a, b) => b[1] - a[1]).slice(0, 12)
      .map(([id]) => ({ color: FACTIONS[id]?.[1] || '#888', label: FACTIONS[id]?.[0] || '#' + id }));
  }
  el.innerHTML = items.map(i => '<span class="lg-item"><span class="lg-dot" style="background:' + i.color + '"></span>' + esc(i.label) + '</span>').join('');
  el.className = 'show';
}

document.getElementById('mode-switch').addEventListener('click', async e => {
  const b = e.target.closest('button');
  if (!b || b.dataset.mode === colorMode) return;
  const mode = b.dataset.mode;
  if (mode !== 'sec' && !(await ensureSov())) return;
  colorMode = mode;
  document.querySelectorAll('#mode-switch button').forEach(x => x.classList.toggle('on', x.dataset.mode === mode));
  applyColors();
  renderLegend();
});

// ────────────────────────── camera fly ──────────────────────────
let flyAnim = null;
function flyTo(target, dist){
  const from = { t: controls.target.clone(), p: camera.position.clone() };
  const dir = camera.position.clone().sub(controls.target).normalize();
  const to = { t: target.clone(), p: target.clone().add(dir.multiplyScalar(dist)) };
  flyAnim = { from, to, t0: performance.now(), dur: 850 };
}

// ────────────────────────── ROUTE PLANNER ──────────────────────────
let ROUTE = [];                 // system indices in order
let ROUTE_SET = new Set();      // system ids on route
let routeLine = null;
const routeLabels = [];
let selFrom = null, selTo = null, routeFlag = 'shortest';

function setupAutocomplete(inputId, acId, onPick){
  const input = document.getElementById(inputId);
  const ac = document.getElementById(acId);
  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    onPick(null);
    if (q.length < 2) { ac.className = 'ac'; return; }
    const starts = [], contains = [];
    for (let i = 0; i < SYSTEMS.length; i++) {
      const n = SYSTEMS[i].name.toLowerCase();
      if (n.startsWith(q)) starts.push(i);
      else if (n.includes(q)) contains.push(i);
      if (starts.length >= 8) break;
    }
    const hits = starts.concat(contains).slice(0, 8);
    if (!hits.length) { ac.className = 'ac'; return; }
    ac.innerHTML = hits.map(i => '<div class="ac-item" data-i="' + i + '"><span>' + esc(SYSTEMS[i].name) + '</span><span class="ac-sec" style="color:' + secHex(SYSTEMS[i].sec10) + '">' + secLabelOf(SYSTEMS[i].sec10) + '</span></div>').join('');
    ac.className = 'ac open';
  });
  ac.addEventListener('mousedown', e => {
    const item = e.target.closest('.ac-item');
    if (!item) return;
    const i = Number(item.dataset.i);
    input.value = SYSTEMS[i].name;
    ac.className = 'ac';
    onPick(i);
  });
  input.addEventListener('blur', () => setTimeout(() => { ac.className = 'ac'; }, 150));
}
setupAutocomplete('rp-from', 'rp-from-ac', i => { selFrom = i; });
setupAutocomplete('rp-to', 'rp-to-ac', i => { selTo = i; });

document.querySelectorAll('.flag-btn').forEach(b => b.addEventListener('click', () => {
  routeFlag = b.dataset.flag;
  document.querySelectorAll('.flag-btn').forEach(x => x.classList.toggle('active', x === b));
}));

function resolveInput(inputId, sel){
  if (sel !== null) return sel;
  const name = document.getElementById(inputId).value.trim().toLowerCase();
  if (!name) return null;
  const i = SYSTEMS.findIndex(s => s.name.toLowerCase() === name);
  return i >= 0 ? i : null;
}

function bfsRoute(fromId, toId){
  const a = SYS_BY_ID.get(fromId), b = SYS_BY_ID.get(toId);
  if (a === undefined || b === undefined) return null;
  if (a === b) return [a];
  const prev = new Int32Array(SYSTEMS.length).fill(-1);
  prev[a] = a;
  let frontier = [a];
  while (frontier.length) {
    const next = [];
    for (const u of frontier) for (const v of ADJ[u]) {
      if (prev[v] !== -1) continue;
      prev[v] = u;
      if (v === b) { const p = [v]; let x = v; while (x !== a) { x = prev[x]; p.push(x); } return p.reverse(); }
      next.push(v);
    }
    frontier = next;
  }
  return null;
}
if (TEST_MODE) { window.__bfsRoute = bfsRoute; window.__planRoute = (f, t) => applyRoute(bfsRoute(f, t)); }

async function planRoute(){
  const fi = resolveInput('rp-from', selFrom), ti = resolveInput('rp-to', selTo);
  if (fi === null || ti === null) { toast('Pick origin and destination systems.', true); return; }
  let indices = null;
  try {
    const ids = await fetch(`${ESI}/route/${SYSTEMS[fi].id}/${SYSTEMS[ti].id}/?flag=${routeFlag}&datasource=tranquility`, { signal: AbortSignal.timeout(8000) })
      .then(r => { if (!r.ok) throw new Error('ESI ' + r.status); return r.json(); });
    indices = ids.map(id => SYS_BY_ID.get(id)).filter(i => i !== undefined);
  } catch {
    indices = bfsRoute(SYSTEMS[fi].id, SYSTEMS[ti].id); // offline fallback (shortest only)
    if (indices) toast('Route service unreachable — using shortest path.');
  }
  if (!indices || indices.length < 2) { toast('No route found.', true); return; }
  try { localStorage.setItem('map_route', JSON.stringify({ f: SYSTEMS[fi].id, t: SYSTEMS[ti].id, flag: routeFlag })); } catch {}
  applyRoute(indices);
}

function applyRoute(indices){
  clearRouteVisuals();
  if (!indices || indices.length < 2) return;
  ROUTE = indices;
  ROUTE_SET = new Set(indices.map(i => SYSTEMS[i].id));

  // polyline colored per-vertex with each system's sec color (in-game style)
  const pts = new Float32Array(indices.length * 3);
  const cols = new Float32Array(indices.length * 3);
  indices.forEach((i, k) => {
    pts[k*3] = pos[i*3]; pts[k*3+1] = pos[i*3+1]; pts[k*3+2] = pos[i*3+2];
    const c = secColor(SYSTEMS[i].sec10);
    cols[k*3] = c.r; cols[k*3+1] = c.g; cols[k*3+2] = c.b;
  });
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pts, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
  routeLine = new THREE.Line(geo, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.95, depthWrite: false }));
  scene.add(routeLine);

  // per-system labels along the route (cap: thin out long routes, keep ends)
  const step = indices.length > 36 ? Math.ceil(indices.length / 36) : 1;
  indices.forEach((i, k) => {
    if (step > 1 && k % step !== 0 && k !== indices.length - 1) return;
    const div = document.createElement('div');
    div.className = 'route-label';
    div.innerHTML = '<b style="color:#ECEDF5">' + esc(SYSTEMS[i].name) + '</b> <span style="color:' + secHex(SYSTEMS[i].sec10) + '">' + secLabelOf(SYSTEMS[i].sec10) + '</span>';
    document.body.appendChild(div);
    routeLabels.push({ div, pos: vecOf(i) });
  });

  // summary + fit camera to the route
  const lows = indices.filter(i => SYSTEMS[i].sec10 < 5 && SYSTEMS[i].sec10 >= 1).length;
  const nulls = indices.filter(i => SYSTEMS[i].sec10 < 1).length;
  const sum = document.getElementById('rp-summary');
  sum.innerHTML = '<b>' + (indices.length - 1) + '</b> jumps · <b>' + esc(SYSTEMS[indices[0]].name) + '</b> → <b>' + esc(SYSTEMS[indices[indices.length-1]].name) + '</b>'
    + (lows ? ' · <span style="color:' + SEC_HEX[4] + '">' + lows + ' lowsec</span>' : '')
    + (nulls ? ' · <span style="color:' + SEC_HEX[0] + '">' + nulls + ' nullsec</span>' : '');
  sum.classList.add('show');

  const box = new THREE.Box3();
  indices.forEach(i => box.expandByPoint(vecOf(i)));
  const c = box.getCenter(new THREE.Vector3());
  const r = Math.max(6, box.getSize(new THREE.Vector3()).length() / 2);
  flyTo(c, r * 2.2);

  applyColors();
  startFeed();
  document.getElementById('feed-list').innerHTML = '<div class="feed-empty">Watching ' + ROUTE.length + ' systems on your route…</div>';
  feedRows = 0;
}

function clearRouteVisuals(){
  if (routeLine) { scene.remove(routeLine); routeLine.geometry.dispose(); routeLine.material.dispose(); routeLine = null; }
  for (const l of routeLabels) l.div.remove();
  routeLabels.length = 0;
  ROUTE = []; ROUTE_SET = new Set();
  needsRender = true;
}

function clearRoute(){
  clearRouteVisuals();
  document.getElementById('rp-summary').classList.remove('show');
  try { localStorage.removeItem('map_route'); } catch {}
  stopFeed();
  document.getElementById('feed-list').innerHTML = '<div class="feed-empty">Plan a route to watch live kills along it.</div>';
  feedRows = 0; document.getElementById('feed-count').textContent = '';
  applyColors();
}

document.getElementById('rp-plan').addEventListener('click', planRoute);
document.getElementById('rp-clear').addEventListener('click', clearRoute);

}

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const hoverLabel = document.getElementById('hover-label');
let hoverIdx = -1, pendingHover = null, downXY = null;

function pick(clientX, clientY){
  pointer.x = (clientX / innerWidth) * 2 - 1;
  pointer.y = -(clientY / innerHeight) * 2 + 1;
  const dist = camera.position.distanceTo(controls.target);
  raycaster.params.Points.threshold = Math.min(6, Math.max(0.5, dist * 0.006));
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObject(points);
  return hits.length ? hits[0].index : -1;
}
canvas.addEventListener('pointermove', e => { pendingHover = [e.clientX, e.clientY]; });
canvas.addEventListener('pointerdown', e => { downXY = [e.clientX, e.clientY]; });
canvas.addEventListener('pointerup', e => {
  if (!downXY) return;
  const moved = Math.hypot(e.clientX - downXY[0], e.clientY - downXY[1]);
  downXY = null;
  if (moved < 5) {
    const idx = pick(e.clientX, e.clientY);
    if (idx >= 0) showInfo(idx); else hideInfo();
  }
});

function showInfo(idx){
  const s = SYSTEMS[idx];
  document.getElementById('ic-name').textContent = s.name;
  document.getElementById('ic-region').textContent = REGIONS[s.r].name;

  secEl.style.color = secHex(s.sec10);

// ────────────────────────── kill pulses ──────────────────────────
function ringTexture(){
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const ctx = c.getContext('2d');
  ctx.strokeStyle = 'rgba(255,255,255,1)'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.arc(32, 32, 26, 0, Math.PI * 2); ctx.stroke();
  return new THREE.CanvasTexture(c);
}
const ringTex = ringTexture();
const pulses = [];
const pulsePool = [];
function pulseAt(sysIdx, iskValue, color = 0xff4455){
  let sprite = pulsePool.pop();
  if (!sprite) {
    sprite = new THREE.Sprite(new THREE.SpriteMaterial({
      map: ringTex, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    }));
    scene.add(sprite);
  }
  sprite.material.color.setHex(color);
  sprite.position.copy(vecOf(sysIdx));
  sprite.visible = true;
  const maxScale = 6 + Math.max(0, Math.log10(Math.max(1, iskValue)) - 6) * 2.2;
  pulses.push({ sprite, t0: performance.now(), dur: 2500, maxScale });
  if (iskValue >= 1e9) setTimeout(() => pulseAt(sysIdx, 1, 0xffffff), 220);
  needsRender = true;
}

// ────────────────────────── kill feed (route-scoped) ──────────────────────
const feedList = document.getElementById('feed-list');
const feedBadge = document.getElementById('feed-badge');
const seenKills = new Set(); const seenOrder = [];
let feedRows = 0, killCount = 0;
const shipNames = new Map(); const shipPending = new Set();

function setBadge(mode){
  feedBadge.className = 'badge ' + mode;
  feedBadge.textContent = mode === 'live' ? 'LIVE' : mode === 'delayed' ? 'DELAYED' : 'OFF';
}
function iskFmt(v){
  if (v == null) return '';
  if (v >= 1e9) return (v/1e9).toFixed(2) + 'B';
  if (v >= 1e6) return (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v/1e3).toFixed(0) + 'k';
  return String(Math.round(v));
}

async function resolveShipNames(ids){
  const need = ids.filter(id => id && !shipNames.has(id) && !shipPending.has(id));
  if (!need.length) return;
  need.forEach(id => shipPending.add(id));
  try {
    const r = await fetch(`${ESI}/universe/names/?datasource=tranquility`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(need),
    });
    if (r.ok) for (const it of await r.json()) shipNames.set(it.id, it.name);
  } catch {}
  need.forEach(id => shipPending.delete(id));
  document.querySelectorAll('[data-ship]').forEach(el => {
    const n = shipNames.get(Number(el.dataset.ship));
    if (n) { el.textContent = n; el.removeAttribute('data-ship'); }
  });
}

function handleKill(km){
  if (!km || !km.killmail_id || seenKills.has(km.killmail_id)) return;
  seenKills.add(km.killmail_id); seenOrder.push(km.killmail_id);
  if (seenOrder.length > 2000) seenKills.delete(seenOrder.shift());

  if (!ROUTE_SET.size || !ROUTE_SET.has(km.solar_system_id)) return; // route-only feed
  const sysIdx = SYS_BY_ID.get(km.solar_system_id);
  if (sysIdx === undefined) return;

  const isk = km.zkb?.totalValue || 0;
  pulseAt(sysIdx, isk);

  const shipId = km.victim?.ship_type_id;
  const shipName = shipNames.get(shipId);
  if (shipId && !shipName) resolveShipNames([shipId]);
  const t = km.killmail_time ? new Date(km.killmail_time) : new Date();
  const hh = String(t.getHours()).padStart(2,'0'), mm = String(t.getMinutes()).padStart(2,'0'), ss = String(t.getSeconds()).padStart(2,'0');

  if (feedRows === 0) feedList.innerHTML = '';
  const row = document.createElement('a');
  row.className = 'kill-row';
  row.href = 'https://zkillboard.com/kill/' + km.killmail_id + '/';
  row.target = '_blank'; row.rel = 'noopener';
  row.innerHTML = '<div class="kill-top"><span class="kill-ship"' + (shipName ? '' : ' data-ship="' + (shipId||0) + '"') + '>'
    + esc(shipName || ('Ship #' + (shipId || '?'))) + '</span><span class="kill-isk">' + iskFmt(isk) + ' ISK</span></div>'
    + '<div class="kill-sub"><span>' + esc(SYSTEMS[sysIdx].name) + ' · ' + esc(REGIONS[SYSTEMS[sysIdx].r].name) + '</span><span>' + hh + ':' + mm + ':' + ss + '</span></div>';
  feedList.prepend(row);
  feedRows++; killCount++;
  document.getElementById('feed-count').textContent = killCount + ' kills';
  while (feedRows > 50) { feedList.lastChild.remove(); feedRows--; }
}
if (TEST_MODE) window.__handleKill = handleKill;

// R2Z2 live loop with zkill-REST fallback — runs only while a route is set
const R2Z2 = 'https://r2z2.zkillboard.com/ephemeral/';
let feedMode = 'off', seq = null, liveFails = 0, feedGen = 0;
const sleep = ms => new Promise(r => setTimeout(r, ms));
const pageVisible = () => document.visibilityState !== 'hidden';

async function fetchSequence(){
  const s = await fetch(R2Z2 + 'sequence.json').then(r => { if (!r.ok) throw new Error('seq ' + r.status); return r.json(); });
  const n = typeof s === 'object' && s !== null ? (s.sequence ?? s.id ?? s.seq) : s;
  if (!Number.isFinite(Number(n))) throw new Error('bad sequence payload');
  return Number(n);
}

async function startFeed(){
  if (feedMode !== 'off') return;    // already polling
  if (TEST_MODE) { setBadge('off'); return; }
  const gen = ++feedGen;
  try {
    seq = await fetchSequence();
    if (gen !== feedGen) return;
    feedMode = 'live'; setBadge('live');
    liveLoop(gen);
  } catch {
    enterFallback(gen);
  }
}
function stopFeed(){
  feedGen++;
  feedMode = 'off';
  setBadge('off');
}

async function liveLoop(gen){
  let lastSeqCheck = Date.now();
  while (feedMode === 'live' && gen === feedGen) {
    if (!pageVisible()) { await sleep(2000); continue; }
    let got = false;
    try {
      const r = await fetch(R2Z2 + (seq + 1) + '.json');
      liveFails = 0;
      if (r.ok) { seq++; got = true; handleKill(await r.json()); }
      else if (r.status !== 404) throw new Error('r2z2 ' + r.status);
    } catch {
      if (++liveFails >= 3) return enterFallback(gen);
    }
    if (!got && Date.now() - lastSeqCheck > 300000) {
      lastSeqCheck = Date.now();
      try { const n = await fetchSequence(); if (Math.abs(n - seq) > 20) seq = n; } catch {}
    }
    await sleep(got ? 500 : 7000);
  }
}

async function enterFallback(gen){
  if (gen !== feedGen) return;
  feedMode = 'delayed'; setBadge('delayed');
  while (feedMode === 'delayed' && gen === feedGen) {
    if (!pageVisible()) { await sleep(5000); continue; }
    // poll the regions the route crosses, then handleKill filters to route systems
    const regionIds = [...new Set(ROUTE.map(i => REGIONS[SYSTEMS[i].r].id))];
    for (const regionId of regionIds) {
      if (gen !== feedGen) return;
      try {
        const kills = await fetch('https://zkillboard.com/api/regionID/' + regionId + '/pastSeconds/3600/').then(r => r.json());
        let budget = 20;
        for (const k of (Array.isArray(kills) ? kills : [])) {
          if (seenKills.has(k.killmail_id)) continue;
          if (budget-- <= 0) break;
          try {
            const km = await fetch(`${ESI}/killmails/` + k.killmail_id + '/' + k.zkb.hash + '/?datasource=tranquility').then(r => r.json());
            handleKill({ ...km, zkb: k.zkb });
          } catch {}
        }
      } catch {}
      await sleep(1500);
    }
    await sleep(60000);
  }
}

// ────────────────────────── CEO layer (injected only for the CEO) ──────────
let SESSION = null;
const ceo = { movements: [], names: {}, pathGroup: null, showPaths: true, replay: null, panel: null };

(async () => {
  try {
    const r = await fetch('/api/me');
    if (!r.ok) return;
    const s = await r.json();
    if (!s.authenticated) return;
    SESSION = s;
    document.getElementById('nav-login').style.display = 'none';
    document.getElementById('nav-dashboard').style.display = 'inline-flex';
    document.getElementById('nav-arbitrage').style.display = 'inline-flex';
    document.getElementById('nav-pi').style.display = 'inline-flex';
    if (s.isCeo) initCeoLayer();
  } catch {}
})();

function initCeoLayer(){
  const panel = document.createElement('div');
  panel.className = 'panel'; panel.id = 'ceo-panel';
  panel.innerHTML = '<div class="panel-head"><span class="panel-title">Member movements</span><span class="panel-title" id="mv-count"></span></div>'
    + '<div class="ceo-stalled" id="ceo-stalled" style="display:none"></div>'
    + '<div class="ceo-controls">'
    + '<select id="mv-range"><option value="3600000">1h</option><option value="21600000">6h</option><option value="86400000" selected>24h</option><option value="604800000">7d</option></select>'
    + '<button id="mv-paths" class="on">Paths</button>'
    + '<button id="mv-replay">▶ Replay</button>'
    + '<select id="mv-speed"><option value="60">60×</option><option value="600" selected>600×</option><option value="3600">3600×</option></select>'
    + '</div>'
    + '<div class="panel-body" id="mv-list"><div class="feed-empty">Loading…</div></div>';
  document.body.appendChild(panel);
  ceo.panel = panel;

  document.getElementById('mv-range').addEventListener('change', loadMovements);
  document.getElementById('mv-paths').addEventListener('click', e => {
    ceo.showPaths = !ceo.showPaths;
    e.target.classList.toggle('on', ceo.showPaths);
    if (ceo.pathGroup) { ceo.pathGroup.visible = ceo.showPaths; needsRender = true; }
  });
  document.getElementById('mv-replay').addEventListener('click', toggleReplay);
  loadMovements();
}

async function loadMovements(){
  const range = Number(document.getElementById('mv-range').value);
  const now = Date.now();
  try {
    const r = await fetch('/api/map?action=log&from=' + (now - range) + '&to=' + now);
    if (!r.ok) throw new Error('API ' + r.status);
    const data = await r.json();
    ceo.movements = data.movements || [];
    ceo.names = data.names || {};
    stopReplay();
    renderMovementList();
    drawPaths();
    const stalled = document.getElementById('ceo-stalled');
    if (!data.status?.lastOkTs || now - data.status.lastOkTs > 25 * 60000) {
      stalled.style.display = '';
      stalled.textContent = '⚠ sampling stalled' + (data.status?.lastOkTs ? ' since ' + new Date(data.status.lastOkTs).toLocaleString() : ' — cron has never run') + (data.status?.lastError ? ' (' + data.status.lastError + ')' : '');
    } else stalled.style.display = 'none';
  } catch (e) {
    document.getElementById('mv-list').innerHTML = '<div class="feed-empty">Failed to load movements (' + esc(e.message) + ')</div>';
  }
}

function sysName(id){ const i = SYS_BY_ID.get(id); return i === undefined ? '#' + id : SYSTEMS[i].name; }

function renderMovementList(){
  const list = document.getElementById('mv-list');
  document.getElementById('mv-count').textContent = ceo.movements.length + ' moves';
  if (!ceo.movements.length) {
    list.innerHTML = '<div class="feed-empty">No member movements in this window.</div>';
    return;
  }
  list.innerHTML = [...ceo.movements].reverse().slice(0, 300).map(m => {
    const t = new Date(m.ts);
    const hh = String(t.getHours()).padStart(2,'0'), mm = String(t.getMinutes()).padStart(2,'0');
    const day = t.toLocaleDateString(undefined, { day: '2-digit', month: '2-digit' });
    return '<div class="mv-row"><span class="mv-time">' + day + ' ' + hh + ':' + mm + '</span>'
      + '<span class="mv-who">' + esc(ceo.names[m.c] || ('#' + m.c)) + '</span>'
      + '<span class="mv-route"><b>' + esc(sysName(m.f)) + '</b> → <b>' + esc(sysName(m.t)) + '</b></span></div>';
  }).join('');
}

function drawPaths(){
  if (ceo.pathGroup) { scene.remove(ceo.pathGroup); disposeGroup(ceo.pathGroup); }
  const group = new THREE.Group();
  const now = Date.now();
  const range = Number(document.getElementById('mv-range').value);
  const shown = ceo.movements.slice(-200);
  for (const m of shown) {
    const route = bfsRoute(m.f, m.t);
    if (!route || route.length < 2) continue;
    const pts = route.map(i => vecOf(i));
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const age = Math.min(1, (now - m.ts) / range);
    const line = new THREE.Line(geo, new THREE.LineDashedMaterial({
      color: 0x39FF14, transparent: true, opacity: 0.75 - age * 0.55,
      dashSize: 1.6, gapSize: 1.0, depthWrite: false,
    }));
    line.computeLineDistances();
    m._pts = pts;
    group.add(line);
  }
  group.visible = ceo.showPaths;
  ceo.pathGroup = group;
  scene.add(group);
  needsRender = true;
}

function disposeGroup(g){ g.traverse(o => { o.geometry?.dispose(); o.material?.dispose(); }); }

const replayName = document.getElementById('replay-name');
let replayDot = null;
function toggleReplay(){
  if (ceo.replay) { stopReplay(); return; }
  if (!ceo.movements.length) return;
  if (!replayDot) {
    replayDot = new THREE.Sprite(new THREE.SpriteMaterial({
      map: ringTex, color: 0x39FF14, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    }));
    replayDot.scale.setScalar(3.2);
    scene.add(replayDot);
  }
  const t0 = ceo.movements[0].ts, t1 = ceo.movements[ceo.movements.length - 1].ts + 600000;
  ceo.replay = { vt: t0, t0, t1, wall: performance.now() };
  document.getElementById('mv-replay').textContent = '■ Stop';
  needsRender = true;
}
function stopReplay(){
  ceo.replay = null;
  if (replayDot) replayDot.visible = false;
  replayName.style.display = 'none';
  const btn = document.getElementById('mv-replay');
  if (btn) btn.textContent = '▶ Replay';
  needsRender = true;
}

function updateReplay(nowMs){
  const rp = ceo.replay;
  if (!rp) return false;
  const speed = Number(document.getElementById('mv-speed').value);
  rp.vt += (nowMs - rp.wall) * speed; rp.wall = nowMs;
  if (rp.vt > rp.t1) { stopReplay(); return false; }
  let active = null;
  for (const m of ceo.movements) {
    if (m.ts <= rp.vt && rp.vt - m.ts < 600000 && m._pts) active = m;
    if (m.ts > rp.vt) break;
  }
  if (active) {
    const prog = (rp.vt - active.ts) / 600000;
    const pts = active._pts;
    const fi = prog * (pts.length - 1);
    const i0 = Math.min(pts.length - 2, Math.floor(fi));
    const p = pts[i0].clone().lerp(pts[i0 + 1], fi - i0);
    replayDot.position.copy(p);
    replayDot.scale.setScalar(Math.max(0.4, 3.2 * worldScale));
    replayDot.visible = true;
    const proj = p.clone().project(camera);
    replayName.style.display = 'block';
    replayName.style.left = ((proj.x * 0.5 + 0.5) * innerWidth + 10) + 'px';
    replayName.style.top = ((-proj.y * 0.5 + 0.5) * innerHeight - 8) + 'px';
    replayName.textContent = (ceo.names[active.c] || '#' + active.c) + ' · ' + new Date(rp.vt).toLocaleTimeString();
  } else {
    replayDot.visible = false;
    replayName.style.display = 'none';
  }
  return true;
}

// ────────────────────────── misc UI ──────────────────────────
function toast(msg, isErr){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = isErr ? 'err show' : 'show';
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), 4000);
}

for (const [btnId, panelId] of [['tg-route', 'route-panel'], ['tg-feed', 'feed-panel']]) {
  document.getElementById(btnId).addEventListener('click', e => {
    const p = document.getElementById(panelId);
    const open = p.classList.toggle('open');
    e.target.classList.toggle('on', open);
    if (open) for (const [ob, op] of [['tg-route', 'route-panel'], ['tg-feed', 'feed-panel']]) {
      if (op !== panelId) { document.getElementById(op).classList.remove('open'); document.getElementById(ob).classList.remove('on'); }
    }
  });
}

// ────────────────────────── render loop ──────────────────────────
applyColors();

function frame(nowMs){
  requestAnimationFrame(frame);
  controls.update();

  if (flyAnim) {
    const k = Math.min(1, (nowMs - flyAnim.t0) / flyAnim.dur);
    const e = k < 0.5 ? 2*k*k : 1 - Math.pow(-2*k + 2, 2) / 2;
    controls.target.lerpVectors(flyAnim.from.t, flyAnim.to.t, e);
    camera.position.lerpVectors(flyAnim.from.p, flyAnim.to.p, e);
    if (k >= 1) flyAnim = null;
    needsRender = true;
  }

  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    const k = (nowMs - p.t0) / p.dur;
    if (k >= 1) {
      p.sprite.visible = false; pulsePool.push(p.sprite); pulses.splice(i, 1);
    } else {
      p.sprite.scale.setScalar((0.6 + k * p.maxScale) * Math.max(worldScale, 0.12));
      p.sprite.material.opacity = 1 - k;
    }
    needsRender = true;
  }

  if (updateReplay(nowMs)) needsRender = true;

  if (pendingHover) {
    const [x, y] = pendingHover; pendingHover = null;
    const idx = pick(x, y);
    if (idx !== hoverIdx) {
      hoverIdx = idx;
      if (idx >= 0) {
        const s = SYSTEMS[idx];
        const sov = sovLabelOf(s.id);
        hoverLabel.innerHTML = esc(s.name) + ' <span style="color:' + secHex(s.sec10) + '">' + secLabelOf(s.sec10) + '</span>'
          + (sov ? '<br><span style="color:var(--m2);font-size:0.6rem">Sovereignty: ' + esc(sov) + '</span>' : '');
        hoverLabel.style.display = 'block';
      } else hoverLabel.style.display = 'none';
    }
    if (idx >= 0) { hoverLabel.style.left = (x + 14) + 'px'; hoverLabel.style.top = (y + 10) + 'px'; }
    canvas.style.cursor = idx >= 0 ? 'pointer' : 'grab';
  }

  if (needsRender) {
    needsRender = false;
    updateWorldScale();
    renderer.render(scene, camera);
    updateRegionLabels();
    updateRouteLabels();
  }
}
requestAnimationFrame(frame);
if (TEST_MODE) window.__mapReady = true;
</script>
